<html lang="en">
<head>
     <head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CRM">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230066ff' width='100' height='100'/><text x='50' y='65' font-size='70' font-weight='bold' fill='white' text-anchor='middle'>C</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230066ff' width='180' height='180'/><text x='90' y='120' font-size='120' font-weight='bold' fill='white' text-anchor='middle'>C</text></svg>">
    
    <title>Client Pipeline CRM</title>
    <style>
        /* باقي CSS من قبل */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .header h1 {
                font-size: 1.8em;
            }
            .metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- محتوى من قبل -->
    
    <script>
        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {

</body>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Pipeline CRM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #fff;
        }

        .btn-add {
            background: #0066ff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: #0052cc;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .metric-label {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #0066ff;
        }

        .metric-value.green {
            color: #00ff88;
        }

        .metric-value.orange {
            color: #ffaa00;
        }

        .filter-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: #0066ff;
            border-color: #0066ff;
        }

        .filter-btn:hover {
            background: #0066ff;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            margin-bottom: 20px;
        }

        .search-box::placeholder {
            color: #aaa;
        }

        .table-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            padding: 15px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: #aaa;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .status-conversation {
            background: rgba(0, 102, 255, 0.2);
            color: #0066ff;
        }

        .status-followup {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .status-prospect {
            background: rgba(200, 200, 200, 0.2);
            color: #ccc;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #0066ff;
        }

        .delete-btn {
            background: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.5);
            color: #ff6464;
        }

        .delete-btn:hover {
            background: #ff6464;
            color: white;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background: #1a1a2e;
            margin: 5% auto;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            color: #fff;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #fff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #666;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-submit {
            background: #0066ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #0052cc;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .empty-state p {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>Client Pipeline</h1>
                <p style="color: #aaa; margin-top: 5px;">Freelance Copywriter CRM</p>
            </div>
            <button class="btn-add" onclick="openAddModal()">+ Add Client</button>
        </div>

        <!-- Metrics -->
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Pipeline Value</div>
                <div class="metric-value" id="pipelineValue">\$0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Won Revenue</div>
                <div class="metric-value green" id="wonRevenue">\$0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Active Clients</div>
                <div class="metric-value orange" id="activeClients">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Total Clients</div>
                <div class="metric-value" id="totalClients">0</div>
            </div>
        </div>

        <!-- Search -->
        <input type="text" class="search-box" id="searchBox" placeholder="Search clients..." onkeyup="filterClients()">

        <!-- Filters -->
        <div class="filter-section">
            <button class="filter-btn active" onclick="filterByStatus('all')">All</button>
            <button class="filter-btn" onclick="filterByStatus('prospect')">Prospect</button>
            <button class="filter-btn" onclick="filterByStatus('in-conversation')">In Conversation</button>
            <button class="filter-btn" onclick="filterByStatus('proposal')">Proposal Out</button>
            <button class="filter-btn" onclick="filterByStatus('active')">Active Client</button>
            <button class="filter-btn" onclick="filterByStatus('follow-up')">Follow Up</button>
            <button class="filter-btn" onclick="filterByStatus('closed')">Closed Won</button>
        </div>

        <!-- Table -->
        <div class="table-section">
            <table id="clientsTable">
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Status</th>
                        <th>Project</th>
                        <th>Value</th>
                        <th>Next Action</th>
                        <th>Last Contact</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>📭 No clients found</p>
                <p style="font-size: 12px;">Add your first client to get started</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="clientModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add New Client</h2>
            <form id="clientForm" onsubmit="saveClient(event)">
                <div class="form-group">
                    <label>Client Name *</label>
                    <input type="text" id="clientName" required placeholder="e.g., Fawaz Central">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="company" placeholder="e.g., Live By Design">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
                </div>
                <div class="form-group">
                    <label>Status *</label>
                    <select id="status" required>
                        <option value="prospect">Prospect</option>
                        <option value="in-conversation">In Conversation</option>
                        <option value="proposal">Proposal Out</option>
                        <option value="active">Active Client</option>
                        <option value="follow-up">Follow Up</option>
                        <option value="closed">Closed Won</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Project</label>
                    <input type="text" id="project" placeholder="e.g., Sales Page">
                </div>
                <div class="form-group">
                    <label>Deal Value ($)</label>
                    <input type="number" id="value" placeholder="e.g., 3000">
                </div>
                <div class="form-group">
                    <label>Next Action</label>
                    <textarea id="nextAction" placeholder="Describe the next step..."></textarea>
                </div>
                <div class="form-group">
                    <label>Last Contact</label>
                    <input type="date" id="lastContact">
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-submit">Save Client</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let clients = JSON.parse(localStorage.getItem('crm_clients')) || [];
        let currentFilter = 'all';
        let editingId = null;

        // Sample Data
        function loadSampleData() {
            if (clients.length === 0) {
                clients = [
                    {
                        id: 1,
                        name: 'Fawaz Central',
                        company: 'Live By Design',
                        email: 'fawaz@livebydesign.com',
                        phone: '+966 50 123 4567',
                        status: 'active',
                        project: 'Sales Page',
                        value: 3000,
                        nextAction: 'Pitch email sequence upsell',
                        lastContact: '2024-04-16'
                    },
                    {
                        id: 2,
                        name: 'Jake Morrison',
                        company: 'Scale Academy',
                        email: 'jake@scaleacademy.com',
                        phone: '+1 555 234 5678',
                        status: 'in-conversation',
                        project: 'Email Sequence',
                        value: 1200,
                        nextAction: 'Send value drop + soft pitch',
                        lastContact: '2024-04-16'
                    },
                    {
                        id: 3,
                        name: 'Toyan Richards',
                        company: 'Toyan Consulting',
                        email: 'toyan@toyanconsulting.com',
                        phone: '+1 555 345 6789',
                        status: 'follow-up',
                        project: 'Sales Page',
                        value: 2500,
                        nextAction: 'Follow up with new angle',
                        lastContact: '2024-04-15'
                    }
                ];
                saveData();
            }
        }

        // Save Data
        function saveData() {
            localStorage.setItem('crm_clients', JSON.stringify(clients));
            updateMetrics();
            renderTable();
        }

        // Open Add Modal
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add New Client';
            document.getElementById('clientForm').reset();
            document.getElementById('clientModal').style.display = 'block';
        }

        // Close Modal
        function closeModal() {
            document.getElementById('clientModal').style.display = 'none';
        }

        // Save Client
        function saveClient(event) {
            event.preventDefault();

            const clientData = {
                id: editingId || Date.now(),
                name: document.getElementById('clientName').value,
                company: document.getElementById('company').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                status: document.getElementById('status').value,
                project: document.getElementById('project').value,
                value: parseInt(document.getElementById('value').value) || 0,
                nextAction: document.getElementById('nextAction').value,
                lastContact: document.getElementById('lastContact').value
            };

            if (editingId) {
                const index = clients.findIndex(c => c.id === editingId);
                clients[index] = clientData;
            } else {
                clients.push(clientData);
            }

            saveData();
            closeModal();
        }

        // Edit Client
        function editClient(id) {
            const client = clients.find(c => c.id === id);
            if (!client) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Client';
            document.getElementById('clientName').value = client.name;
            document.getElementById('company').value = client.company;
            document.getElementById('email').value = client.email;
            document.getElementById('phone').value = client.phone;
            document.getElementById('status').value = client.status;
            document.getElementById('project').value = client.project;
            document.getElementById('value').value = client.value;
            document.getElementById('nextAction').value = client.nextAction;
            document.getElementById('lastContact').value = client.lastContact;

            document.getElementById('clientModal').style.display = 'block';
        }

        // Delete Client
        function deleteClient(id) {
            if (confirm('Are you sure you want to delete this client?')) {
                clients = clients.filter(c => c.id !== id);
                saveData();
            }
        }

        // Get Status Badge Class
        function getStatusClass(status) {
            const statusMap = {
                'active': 'status-active',
                'in-conversation': 'status-conversation',
                'follow-up': 'status-followup',
                'prospect': 'status-prospect'
            };
            return statusMap[status] || 'status-prospect';
        }

        // Format Date
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Render Table
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            let filteredClients = clients;

            if (currentFilter !== 'all') {
                filteredClients = clients.filter(c => c.status === currentFilter);
            }

            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            if (searchTerm) {
                filteredClients = filteredClients.filter(c =>
                    c.name.toLowerCase().includes(searchTerm) ||
                    c.company.toLowerCase().includes(searchTerm) ||
                    c.email.toLowerCase().includes(searchTerm)
                );
            }

            if (filteredClients.length === 0) {
                tableBody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tableBody.innerHTML = filteredClients.map(client => `
                <tr>
                    <td>
                        <div style="font-weight: 600;">${client.name}</div>
                        <div style="color: #aaa; font-size: 12px;">${client.company}</div>
                    </td>
                    <td>
                        <span class="status-badge ${getStatusClass(client.status)}">
                            ${client.status.charAt(0).toUpperCase() + client.status.slice(1).replace('-', ' ')}
                        </span>
                    </td>
                    <td>${client.project}</td>
                    <td style="color: #0066ff; font-weight: 600;">$${client.value.toLocaleString()}</td>
                    <td style="font-size: 14px; color: #ddd;">${client.nextAction}</td>
                    <td style="color: #aaa; font-size: 14px;">${formatDate(client.lastContact)}</td>
                    <td>
                        <button class="action-btn" onclick="editClient(${client.id})">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteClient(${client.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // Filter by Status
        function filterByStatus(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderTable();
        }

        // Filter Clients (Search)
        function filterClients() {
            renderTable();
        }

        // Update Metrics
        function updateMetrics() {
            const totalValue = clients.reduce((sum, c) => sum + c.value, 0);
            const wonValue = clients.filter(c => c.status === 'closed').reduce((sum, c) => sum + c.value, 0);
            const activeCount = clients.filter(c => c.status === 'active').length;

            document.getElementById('pipelineValue').textContent = '$' + totalValue.toLocaleString();
            document.getElementById('wonRevenue').textContent = '$' + wonValue.toLocaleString();
            document.getElementById('activeClients').textContent = activeCount;
            document.getElementById('totalClients').textContent = clients.length;
        }

        // Close Modal on Outside Click
        window.onclick = function(event) {
            const modal = document.getElementById('clientModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Initialize
        loadSampleData();
        renderTable();
    </script>
</body>
</html>
